name: Run Google Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    # strategy:
    #   matrix:
    #     simd: [NONE, AVX128, AVX256, AVX512]

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev cmake build-essential libtbb-dev libxcb-xinput0 libxcb-xinerama0 libxcb-cursor-dev libvulkan-dev wget lsb-release software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt-get install -y clang-19

      - name: Configure
        env:
          CC: clang-19
          CXX: clang++-19
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run Tests
        run: cd ${{ github.workspace }}/build && ./unit_tests
